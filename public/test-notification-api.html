<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Notification API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .result {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .error {
            background: #fee;
            color: #c00;
        }
        .success {
            background: #efe;
            color: #060;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Test Notification API</h1>

    <div>
        <button onclick="testCount()">Test Count</button>
        <button onclick="testIndex()">Test Index</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <div id="result" class="result"></div>

    <script>
        function log(message, isError = false) {
            const resultDiv = document.getElementById('result');
            const timestamp = new Date().toLocaleTimeString();
            const className = isError ? 'error' : 'success';
            resultDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
        }

        function clearLog() {
            document.getElementById('result').innerHTML = '';
        }

        async function testCount() {
            log('Testing /api/notifications/count...');
            try {
                const response = await fetch('/api/notifications/count', {
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'same-origin'
                });

                log(`Response Status: ${response.status} ${response.statusText}`);

                const data = await response.json();
                log(`Response Data: ${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                log(`Error: ${error.message}`, true);
                console.error('Full error:', error);
            }
        }

        async function testIndex() {
            log('Testing /api/notifications...');
            try {
                const response = await fetch('/api/notifications', {
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'same-origin'
                });

                log(`Response Status: ${response.status} ${response.statusText}`);

                const text = await response.text();
                log(`Response Text: ${text.substring(0, 500)}...`);

                try {
                    const data = JSON.parse(text);
                    log(`Response Data: ${JSON.stringify(data, null, 2)}`);
                } catch (e) {
                    log(`Failed to parse JSON: ${e.message}`, true);
                }
            } catch (error) {
                log(`Error: ${error.message}`, true);
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
